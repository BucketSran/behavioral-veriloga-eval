syntax:
  must_include:
    - "@(timer("
    - "@(cross("
    - "transition("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "simultaneous_event_order"
parity:
  required: true
  tolerance_notes: "Task-aware parity compares settled plateau levels for a deterministic timer-then-true-cross ordering; exact-threshold touch / same-time race artifacts are intentionally rejected."
